name: Build and Release

on:
  push:
    branches:
      - feature_dev
    paths-ignore:
      - 'README.md'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive_name: duck2api-linux-amd64.tar.gz
            binary_name: duck2api
          - goos: windows
            goarch: amd64
            archive_name: duck2api-windows-amd64.tar.gz
            binary_name: duck2api.exe
          - goos: darwin
            goarch: amd64
            archive_name: duck2api-darwin-amd64.tar.gz
            binary_name: duck2api
          - goos: freebsd
            goarch: amd64
            archive_name: duck2api-freebsd-amd64.tar.gz
            binary_name: duck2api
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          go build -trimpath -ldflags='-s -w' -o "dist/${{ matrix.binary_name }}" .
          tar -C dist -czf "${{ matrix.archive_name }}" "${{ matrix.binary_name }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ matrix.archive_name }}
          path: ${{ matrix.archive_name }}
          if-no-files-found: error
          compression-level: 0

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: release-assets
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GHCR_PAT }}
        with:
          tag_name: v3.0.0
          files: release-assets/*

      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@v2.1.0
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 1
          keep_minimum_runs: 8
